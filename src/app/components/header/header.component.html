<header>
    <div class="d-flex align-items-center gap-2">
        <i class="fa-solid fa-bars me-3 ct_fs_18 ct_menu_bar"></i>
    </div>
    <div class="d-flex align-items-center gap-3">
        <div class="ct_right_dropdown dropdown">
            <button id="dropdownMenuButton" id="dropdownMenuButton1" data-bs-toggle="dropdown" aria-expanded="false">
                <div class="d-flex align-items-center gap-2">
                    <img [src]="userData?.profile_image ? userData?.profile_image : 'img/no_pro.png'" alt=""
                        class="ct_img_30" />
                    <div class="text-start">
                        <small class="ct_text_clr_66748c ct_fs_16">{{userData?.first_name}}</small>
                    </div>
                </div>
                <i class="fa-solid fa-angle-down ms-auto"></i>
            </button>
            <ul class="dropdown-menu" aria-labelledby="dropdownMenuButton1">
                <li>
                    <a class="dropdown-item" routerLink="/home/my-profile">My Profile</a>
                </li>
                <li>
                    <a class="dropdown-item" routerLink="/home/change-password">Change Password</a>
                </li>
                <li>
                    <a class="dropdown-item text-logout" href="javascript:void(0)" data-bs-toggle="modal"
                        data-bs-target="#ct_logout_modal_post">
                        <i class="fa-solid fa-arrow-right-from-bracket"></i>
                        Log Out</a>
                </li>
            </ul>
        </div>
    </div>
</header>

<!--Log out Modal -->
<div class="modal fade" id="ct_logout_modal_post" tabindex="-1" aria-labelledby="ct_delete_postLabel"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header pb-0 border-0">
                <button type="button" class="btn-close ct_close" data-bs-dismiss="modal" aria-label="Close">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            <div class="modal-body">
                <div class="ct_delete_post_modal">
                    <figure>
                        <figcaption class="mt-4">
                            <div class="text-center">
                                <svg width="37" height="44" viewBox="0 0 37 44" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M22.625 28.875V32.3125C22.625 33.2242 22.2628 34.0985 21.6182 34.7432C20.9735 35.3878 20.0992 35.75 19.1875 35.75H5.4375C4.52582 35.75 3.65148 35.3878 3.00682 34.7432C2.36216 34.0985 2 33.2242 2 32.3125V11.6875C2 10.7758 2.36216 9.90148 3.00682 9.25682C3.65148 8.61216 4.52582 8.25 5.4375 8.25H18.5C20.3984 8.25 22.625 9.78914 22.625 11.6875V15.125M28.125 28.875L35 22L28.125 15.125M11.625 22H33.625"
                                        stroke="#2563EB" stroke-width="2" stroke-linecap="round"
                                        stroke-linejoin="round" />
                                </svg>

                                <h4 class="ct_fs_22 ct_fw_600 ct_blue_text my-3">
                                    Log Out
                                </h4>
                                <p class="mb-0">
                                    Are you sure you want to log out? You can always come
                                    back anytime and track your goals and progress.
                                </p>
                            </div>
                        </figcaption>
                    </figure>
                    <div class="d-flex justify-content-center border-0 gap-3 ct_modal_footer mt-4">
                        <button type="button" class="ct_bule_transparent_btn ct_h_40 w-100 ct_fw_500"
                            data-bs-dismiss="modal">
                            Cancel
                        </button>
                        <a (click)="logout()"
                            class="ct_border_radius_5 ct_h_40 ct_black_btn w-100 ct_fw_500 text-center"
                            data-bs-dismiss="modal">Yes, Log Me
                            Out</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
