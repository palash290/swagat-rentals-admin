<div class="auth-wrapper">
      <div class="container-fluid">
            <div class="ct_admin_logo ct-auth-logo">
                  <img src="img/logo-n.png" alt="" />
            </div>
            <!-- Login Section -->
            <div class="ct-login-wrapper">
                  <div class="ct-login-card">
                        <div class="login-role-tabs" role="tablist">
                              <button type="button" class="login-role-tab"
                                    [class.active]="loginRole === 'admin'" (click)="setRole('admin')">
                                    Admin
                              </button>
                              <button type="button" class="login-role-tab"
                                    [class.active]="loginRole === 'sub_admin'" (click)="setRole('sub_admin')">
                                    Sub Admin
                              </button>
                        </div>
                        
                        <div class="text-center mb-4">
                              <div class="ct-title ct_fs_30 ct_fw_600 mb-2">
                                    {{ loginRole === 'admin' ? 'Admin' : 'Sub Admin' }} Login
                              </div>
                              <div class="ct-subtitle ct_dark_grey_text">
                                    Secure admin access to manage clients,
                                    systems, billing and services.
                              </div>
                        </div>
                      
                        <form [formGroup]="Form">
                              <div class="mb-3">
                                    <label class="form-label small">Email</label>
                                    <input type="email" class="form-control ct_input" placeholder="Enter your email"
                                          formControlName="email" />
                                    <div *ngIf="Form.controls['email'].invalid && Form.controls['email'].touched"
                                          class="err_msg">
                                          <div *ngIf="Form.controls['email'].errors?.['required']"
                                                class="ct_fs_14 mt-1">
                                                Email is required.
                                          </div>
                                          <div *ngIf="Form.controls['email'].errors?.['email'] && !Form.controls['email'].errors?.['required']"
                                                class="ct_fs_14 mt-1">
                                                Invalid email format.</div>
                                    </div>
                              </div>
                              <div class="form-group mb-3">
                                    <label for="" class="mb-2 ct_text_black ct_fw_400">
                                          Password</label>
                                    <div class="position-relative">
                                          <input type="{{ isPasswordVisible ? 'text' : 'password' }}"
                                                placeholder="Enter your password"
                                                class="form-control ct_input ct_input_pe_40"
                                                formControlName="password" />
                                          <!-- <i class="fa-solid fa-eye-slash ct_show_eye"></i> -->
                                          <i class="fa-regular ct_show_eye"
                                                [ngClass]="isPasswordVisible ? 'fa-eye' : 'fa-eye-slash' "
                                                (click)="togglePasswordVisibility()"></i>
                                          <div *ngIf="Form.controls['password'].invalid && Form.controls['password'].touched"
                                                class="err_msg">
                                                <div *ngIf="Form.controls['password'].errors?.['required']"
                                                      class="ct_fs_14 mt-1">
                                                      Password is
                                                      required.</div>
                                          </div>
                                    </div>
                              </div>
                              <div class="text-end mb-3">
                                    <a routerLink="/forgot-password" class="ct-forgot ct_blue_text ct_fw_600">Forgot
                                          Password?</a>
                              </div>
                              <a (click)="login()" type="submit" class="ct_black_btn w-100">
                                    Sign In
                              </a>
                        </form>
                  </div>
            </div>
      </div>
</div>

<div class="loader-overlay" *ngIf="loading">
      <div class="loader">
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
      </div>
</div>
