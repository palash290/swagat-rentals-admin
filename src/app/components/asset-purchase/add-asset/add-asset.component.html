<div class="ct_px_30 mt-4 pb-5">
    <div class="container-fluid">
        <div class="d-flex align-items-center gap-2 justify-content-between flex-wrap ct_mb_35">
            <h4 class="ct_text_black ct_fs_24 ct_fw_600 mb-0">
                <a routerLink="/home/asset-purchase" class="ct_text_black">
                    <i class="fa-solid fa-arrow-left me-2"></i>
                </a>
                Add New Asset
            </h4>
        </div>
        <div class="ct_wrapper_white_box ct_mb_35">
            <h2 class="ct_fs_18 ct_fw_600">Asset Information</h2>
            <div class="row mt-4">
                <div class="col-md-12  ct_mb_35">
                    <label class="form-label ">Serial No</label>
                    <input type="text" class="form-control ct_input" placeholder="Enter serial no." />
                </div>
                <div class="col-md-6  ct_mb_35">
                    <label class="form-label"> Asset Category</label>
                    <select class="form-select ct_input_select">
                        <option selected>Laptop</option>
                    </select>
                </div>
                <div class="col-md-6  ct_mb_35">
                    <label class="form-label "> Brand / Model</label>
                    <select class="form-select ct_input_select">
                        <option selected> Select Brand / Model</option>
                    </select>
                </div>
                <div class="col-md-6  ct_mb_35">
                    <label class="form-label "> OS</label>
                    <select class="form-select ct_input_select">
                        <option selected>Select </option>
                    </select>
                </div>
                <div class="col-md-6  ct_mb_35">
                    <label class="form-label "> CPU</label>
                    <select class="form-select ct_input_select">
                        <option selected> Select Brand / Model</option>
                    </select>
                </div>
                <div class="col-md-6  ct_mb_35">
                    <label class="form-label "> Display</label>
                    <select class="form-select ct_input_select">
                        <option selected> Select </option>
                    </select>
                </div>
                <div class="col-md-6  ct_mb_35">
                    <label class="form-label "> Quantity</label>
                    <input type="number" class="form-control ct_input" placeholder="0" />
                </div>
            </div>
        </div>
        <div class="ct_wrapper_white_box ct_mb_35">
            <h2 class="ct_fs_18 ct_fw_600">Purchase Details </h2>
            <div class="row mt-4">
                <div class="col-md-6  ct_mb_35">
                    <label class="form-label "> Vendor Name</label>
                    <input type="text" class="form-control ct_input" placeholder="Enter vendor name" />
                </div>
                <div class="col-md-6  ct_mb_35">
                    <label class="form-label "> Purchase Date</label>
                    <input type="date" class="form-control ct_input" placeholder="dd/mm/yyyy" />
                </div>
                <div class="col-md-6  ct_mb_35">
                    <label class="form-label "> Warranty Start Date</label>
                    <input type="date" class="form-control ct_input" placeholder="dd/mm/yyyy" />
                </div>
                <div class="col-md-6  ct_mb_35">
                    <label class="form-label "> Warranty End Date </label>
                    <input type="date" class="form-control ct_input" placeholder="dd/mm/yyyy" />
                </div>
            </div>
        </div>
        <div class="ct_wrapper_white_box ct_mb_35">
            <h2 class="ct_fs_18 ct_fw_600"> Pricing Details </h2>
            <div class="row mt-4">
                <div class="col-md-6  ct_mb_35">
                    <label class="form-label "> Cost per Unit</label>
                    <input type="number" class="form-control ct_input" placeholder="0" />
                </div>
                <div class="col-md-6  ct_mb_35">
                    <label class="form-label "> Total Cost</label>
                    <input type="number" class="form-control ct_input" placeholder="0" />
                </div>
            </div>
        </div>
        <div class="d-flex gap-3 mt-5 pt-3">
            <button class="ct_black_btn px-4">Add Asset</button>
            <button class="ct_bule_transparent_btn px-4">
                Cancel
            </button>
        </div>
    </div>
</div>
