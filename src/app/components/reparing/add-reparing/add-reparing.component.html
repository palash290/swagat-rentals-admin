<div class="ct_px_30 mt-4 pb-5">
    <div class="container-fluid">
        <div class="d-flex align-items-center gap-2 justify-content-between flex-wrap ct_mb_35">
            <h4 class="ct_text_black ct_fs_24 ct_fw_600 mb-0">
                <a class="ct_text_black">
                    <i class="fa-solid fa-arrow-left me-2"></i>
                </a>
                Add Repair Entry
            </h4>
        </div>
        <div class="ct_wrapper_white_box ct_mb_35">
            <div class="row mt-4">
                <div class="col-md-12  ct_mb_35">
                    <label class="form-label ">Serial No</label>
                    <input type="text" class="form-control ct_input" placeholder="Enter serial no." />
                </div>
                <div class="col-md-6  ct_mb_35">
                    <label class="form-label"> Asset Category</label>
                    <select class="form-select ct_input_select">
                        <option selected>Laptop</option>

                    </select>
                </div>
                <div class="col-md-6  ct_mb_35">
                    <label class="form-label "> Brand / Model</label>
                    <select class="form-select ct_input_select">
                        <option selected> Select Brand / Model</option>
                    </select>
                </div>
                <div class="col-md-6  ct_mb_35">
                    <label class="form-label ">Date Sent</label>
                    <input type="date" class="form-control ct_input" />
                </div>
                <div class="col-md-6  ct_mb_35">
                    <label class="form-label ">Vendor</label>
                    <input type="text" class="form-control ct_input" placeholder="Enter vendor name" />
                </div>
                <div class="col-md-12">
                    <label class="form-label ">Description</label>
                    <textarea class="form-control" id="exampleFormControlTextarea1" rows="3"
                        placeholder="Enter description"></textarea>
                </div>
            </div>
        </div>
        <div class="d-flex gap-3 mt-5">
            <button class="ct_black_btn px-4">Add Entry</button>
            <button class="ct_bule_transparent_btn px-4">
                Cancel
            </button>
        </div>
    </div>
</div>
